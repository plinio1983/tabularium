services:
  tabularium:
    image: ${APP_IMAGE:-tabularium:latest}
    container_name: tabularium
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"
    volumes:
      - tabularium_uploads:/app/public/uploads
    networks:
      cluster_frontend:
        aliases:
          - tabularium
      cluster_backend: {}

  tabularium-db:
    image: postgres:16-alpine
    container_name: tabularium-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tabularium}
      POSTGRES_USER: ${POSTGRES_USER:-tabularium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - tabularium_pgdata:/var/lib/postgresql/data
    networks:
      - cluster_backend

volumes:
  tabularium_pgdata:
  tabularium_uploads:

networks:
  cluster_frontend:
    external: true
  cluster_backend:
    external: true
